name: Deploy API to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'api/**'

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy API

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: cac47d7aea54acr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            cac47d7aea54acr.azurecr.io/docsense-ai-api:${{ github.sha }}
            cac47d7aea54acr.azurecr.io/docsense-ai-api:latest

      - name: Log in to Azure (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new image to Container App
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name docsense-ai-api \
              --resource-group rg-hackathon-AI-Alchemists \
              --image cac47d7aea54acr.azurecr.io/docsense-ai-api:${{ github.sha }}
